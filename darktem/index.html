<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar</title>
    <link rel="stylesheet" href="./style.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            transition:0.4s;
        }

        /* Navbar */
        nav{
            background:#0077cc;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            color:white;
            font-size:24px;
            font-weight:bold;
        }

        .nav-links{
            list-style:none;
            display:flex;
            gap:25px;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            font-size:18px;
        }

        .nav-links a:hover{
            color:yellow;
        }

        button{
            padding:8px 15px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        /* Dark Theme */
        .dark-mode{
            background:black;
            color:white;
        }

        .dark-mode nav{
            background:#111;
        }

        .dark-mode .nav-links a{
            color:white;
        }

        .content{
            text-align:center;
            margin-top:100px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">achevers it solutions</div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Properties</a></li>
            <li><a href="#">Property Details</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <button onclick="toggleTheme()">🌙 Dark Mode</button>
    </nav>

    <div class="content">
        <h1>Welcome to Achevers it solutions</h1>
        <p>Find your dream property here.</p>
    </div>
    <section class="ha-rotateSection">
        <div class="ha-rotateWrapper">
            <div class="ha-rotateCarousel">
                <button type="button" class="ha-rotateCard" style="transform: rotateY(0deg) translateZ(280px);">
                    <div class="ha-rotateCardInner">
                        <div class="ha-rotateImgWrap">
                            <img alt="Smart Lighting Automation" class="ha-rotateImg" src="../assets/java.png">
                        </div>
                        <h3 class="ha-rotateTitle">Java</h3>
                    </div>
                </button>
                <button type="button" class="ha-rotateCard" style="transform: rotateY(60deg) translateZ(280px);">
                    <div class="ha-rotateCardInner">
                        <div class="ha-rotateImgWrap">
                            <img alt="Intelligent Security &amp; Surveillance Systems" class="ha-rotateImg" src="../assets/css.png">
                        </div>
                        <h3 class="ha-rotateTitle">CSS</h3>
                    </div>
                </button>
                <button type="button" class="ha-rotateCard" style="transform: rotateY(120deg) translateZ(280px);">
                    <div class="ha-rotateCardInner">
                        <div class="ha-rotateImgWrap">
                            <img alt="Climate Control (Ventilation Automation)" class="ha-rotateImg" src="../assets/sql.png">
                        </div>
                        <h3 class="ha-rotateTitle">SQL</h3>
                    </div>
                </button>
                <button type="button" class="ha-rotateCard" style="transform: rotateY(180deg) translateZ(280px);">
                    <div class="ha-rotateCardInner">
                        <div class="ha-rotateImgWrap">
                            <img alt="Energy Usage Monitoring &amp; Optimization" class="ha-rotateImg" src="../assets/java.png">
                        </div>
                        <h3 class="ha-rotateTitle">Java</h3>
                    </div>
                </button>
                <button type="button" class="ha-rotateCard" style="transform: rotateY(240deg) translateZ(280px);">
                    <div class="ha-rotateCardInner">
                        <div class="ha-rotateImgWrap">
                            <img alt="Motorized Curtain &amp; Appliance Automation" class="ha-rotateImg" src="../assets/react.png">
                        </div>
                        <h3 class="ha-rotateTitle">React</h3>
                    </div>
                </button>
                <button type="button" class="ha-rotateCard" style="transform: rotateY(300deg) translateZ(280px);">
                    <div class="ha-rotateCardInner">
                        <div class="ha-rotateImgWrap">
                            <img alt="Home Theatre &amp; Entertainment Automation" class="ha-rotateImg" src="../assets/oracle.png">
                        </div>
                        <h3 class="ha-rotateTitle">Oracle</h3>
                    </div>
                </button>
            </div>
        </div>
    </section>

    <script src="./app.js"></script>
</body>
</html>
